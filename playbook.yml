---
- name: Déploiement DEV / PROD avec Ansible
  hosts: all
  become: true
  gather_facts: true

  vars:
    page_dest: /var/www/html/index.html

  tasks:
    - name: Afficher l'environnement cible
      debug:
        msg:
          - "Hôte : {{ inventory_hostname }}"
          - "App : {{ app_name }}"
          - "Environnement : {{ env }}"
          - "Auteur : {{ author }}"

    - name: Installer nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Démarrer nginx (Codespaces)
      command: service nginx start

    - name: Vérifier que le dossier web existe
      file:
        path: /var/www/html
        state: directory

    - name: Déployer la page web (DEV / PROD)
      template:
        src: index.html.j2
        dest: "{{ page_dest }}"
        owner: root
        group: root
        mode: "0644"
      notify: Redémarrer nginx

    - name: Vérifier que le site répond
      uri:
        url: http://localhost
        status_code: 200
      register: result
      retries: 5
      delay: 2
      until: result.status == 200

    - name: Afficher statut HTTP
      debug:
        msg: "Site OK avec code {{ result.status }}"

  handlers:
    - name: Redémarrer nginx
      service:
        name: nginx
        state: restarted